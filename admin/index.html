<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NCS Driving Academy - Admin Panel</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        background-color: #0D0D0D;
        color: #FFFFFF;
      }

      @keyframes pulseRed {
        0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(227, 24, 55, 0.6); }
        70% { transform: scale(1.1); box-shadow: 0 0 0 8px rgba(227, 24, 55, 0); }
        100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(227, 24, 55, 0); }
      }

      @keyframes successPop {
        0% { transform: scale(0.6); opacity: 0.5; }
        50% { transform: scale(1.3); opacity: 1; }
        100% { transform: scale(1); }
      }

      .pulse-active {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background-color: #E31837;
        color: #FFF;
        font-size: 10px;
        animation: pulseRed 1.8s infinite ease-in-out;
      }

      .success-checkmark {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background-color: #00C853;
        color: #FFF;
        font-size: 10px;
        font-weight: bold;
        animation: successPop 0.4s ease-out;
      }

      .pending-dot {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        border: 1px solid #555;
        color: #888;
        font-size: 10px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
